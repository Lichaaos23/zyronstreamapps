<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TV Player</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial;
    color:white;
}

.player{
    width:90%;
    max-width:900px;
    margin:auto;
    margin-top:30px;
    background:#111;
    border-radius:15px;
    overflow:hidden;
}

.top{
    display:flex;
    align-items:center;
    gap:15px;
    padding:15px;
    background:#1d1d1d;
}

.top img{
    width:60px;
    background:white;
    border-radius:10px;
    padding:5px;
}

video{
    width:100%;
    background:black;
}

.status{
    padding:10px;
}
</style>
</head>
<body>

<div class="player">

    <div class="top">
        <img src="https://solparaguay.qvixprimary.com/assets/resources/img/channels/espn_660a27baf43344968326c178550f1f3f.png">
        <h2>ESPN 1</h2>
    </div>

    <video id="video" controls autoplay></video>

    <div class="status" id="status">Conectando...</div>

</div>

<script>

const video = document.getElementById("video");
const status = document.getElementById("status");

const original =
'http://45.188.229.33:8000/play/a1ac/index.m3u8?hls';

/*
PROXY
*/

const stream =
'https://corsproxy.io/?' + encodeURIComponent(original);

if(Hls.isSupported()){

    const hls = new Hls();

    hls.loadSource(stream);

    hls.attachMedia(video);

    hls.on(Hls.Events.MANIFEST_PARSED, function() {

        status.innerHTML = "Canal conectado";

        video.play();

    });

    hls.on(Hls.Events.ERROR, function(event, data) {

        console.log(data);

        status.innerHTML =
        "Error: " + data.details;

    });

}
</script>

</body>
</html>
